<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyago Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --maroon: #6E1F2B;
            --maroon-dark: #4d1520;
            --maroon-light: rgba(110, 31, 43, .08);
            --gold: #D9A441;
            --gold-light: rgba(217, 164, 65, .12);
            --rust: #A35334;
            --ivory: #F5EFE6;
            --ivory-deep: #EDE5D8;
            --dark: #0d0605;
            --text: #2A1A1A;
            --text-muted: #7a6a64;
            --light-gray: #E8E3DC;
            --medium-gray: #8B8680;
            --green: #4A7C59;
            --green-light: rgba(74, 124, 89, .1);
            --red: #D32F2F;
            --red-light: rgba(211, 47, 47, .1);
            --blue: #1976D2;
            --blue-light: rgba(25, 118, 210, .1);
            --orange: #FF7A00;
            --orange-light: rgba(255, 122, 0, .1);
            --white: #FFFFFF;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-heading: 'Playfair Display', serif;
            --sidebar-w: 272px;
            --header-h: 64px;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 12px rgba(13, 6, 5, .06);
            --shadow-lg: 0 10px 40px rgba(13, 6, 5, .12);
            --transition: .3s cubic-bezier(.4, 0, .2, 1);
        }

        html {
            font-size: 15px;
            background: var(--ivory);
            overflow-x: hidden
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--ivory);
            line-height: 1.6;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 3px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--medium-gray)
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1
            }

            to {
                transform: translateX(100%);
                opacity: 0
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(.92);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        @keyframes checkDraw {
            from {
                stroke-dashoffset: 50
            }

            to {
                stroke-dashoffset: 0
            }
        }

        .fade-in {
            animation: fadeIn .3s ease
        }

        .scale-in {
            animation: scaleIn .3s ease
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 90;
            backdrop-filter: blur(2px)
        }

        .sidebar-overlay.active {
            display: block
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--white);
            border-right: 1px solid var(--light-gray);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            overflow-y: auto;
            transition: transform var(--transition)
        }

        .sidebar-head {
            padding: 20px 18px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .sidebar-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--maroon), var(--rust));
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0
        }

        .sidebar-brand {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: 700;
            color: var(--maroon);
            letter-spacing: .06em
        }

        .sidebar-nav {
            flex: 1;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border: none;
            background: transparent;
            color: var(--medium-gray);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 500;
            transition: all var(--transition);
            text-align: left;
            width: 100%
        }

        .nav-item:hover {
            background: var(--ivory);
            color: var(--maroon)
        }

        .nav-item.active {
            background: var(--maroon-light);
            color: var(--maroon);
            border-left: 3px solid var(--maroon);
            padding-left: 13px;
            font-weight: 600
        }

        .nav-item svg {
            flex-shrink: 0
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--medium-gray);
            padding: 18px 16px 6px;
            opacity: .7
        }

        .sidebar-foot {
            padding: 14px 18px;
            border-top: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--maroon);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0
        }

        .sidebar-user-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text)
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--medium-gray)
        }

        .sidebar-close {
            display: none;
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--medium-gray);
            cursor: pointer;
            z-index: 101
        }

        /* Main */
        .main {
            flex: 1;
            margin-left: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            background: var(--ivory);
            min-width: 0
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--light-gray);
            padding: 0 28px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            color: var(--medium-gray)
        }

        .header-title {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--maroon)
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .header-time {
            font-size: 13px;
            color: var(--medium-gray);
            font-weight: 500;
            font-variant-numeric: tabular-nums
        }

        .header-btn {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--medium-gray);
            transition: color var(--transition);
            display: flex;
            align-items: center
        }

        .header-btn:hover {
            color: var(--maroon)
        }

        .notif-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--red);
            color: var(--white);
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .header-dropdown {
            position: relative
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-sm);
            min-width: 160px;
            box-shadow: var(--shadow-lg);
            z-index: 200;
            margin-top: 8px;
            overflow: hidden
        }

        .dropdown-menu.active {
            display: block;
            animation: scaleIn .2s ease
        }

        .dropdown-item {
            padding: 11px 16px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text);
            font-size: 13px;
            text-align: left;
            width: 100%;
            transition: background .15s
        }

        .dropdown-item:hover {
            background: var(--ivory)
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            min-width: 0
        }

        /* Sections */
        .section {
            display: none
        }

        .section.active {
            display: block;
            animation: fadeIn .35s ease
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 28px
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px;
            transition: transform var(--transition), box-shadow var(--transition)
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg)
        }

        .stat-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .stat-icon.maroon {
            background: var(--maroon-light);
            color: var(--maroon)
        }

        .stat-icon.green {
            background: var(--green-light);
            color: var(--green)
        }

        .stat-icon.blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .stat-icon.orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .stat-trend {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px
        }

        .stat-trend.up {
            background: var(--green-light);
            color: var(--green)
        }

        .stat-trend.down {
            background: var(--red-light);
            color: var(--red)
        }

        .stat-label {
            font-size: 12.5px;
            color: var(--medium-gray);
            font-weight: 500;
            margin-bottom: 4px
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--dark);
            font-variant-numeric: tabular-nums
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 28px
        }

        .chart-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .chart-card h3 svg {
            color: var(--maroon)
        }

        .chart-card canvas {
            max-height: 280px
        }

        /* Activity Feed */
        .activity-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px
        }

        .activity-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--ivory);
            transition: background .15s
        }

        .activity-item:hover {
            background: var(--ivory-deep)
        }

        .activity-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px
        }

        .activity-dot.green {
            background: var(--green-light);
            color: var(--green)
        }

        .activity-dot.blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .activity-dot.orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .activity-dot.gold {
            background: var(--gold-light);
            color: var(--gold)
        }

        .activity-dot.red {
            background: var(--red-light);
            color: var(--red)
        }

        .activity-text {
            flex: 1;
            min-width: 0
        }

        .activity-text strong {
            font-size: 13px;
            color: var(--text)
        }

        .activity-text p {
            font-size: 12px;
            color: var(--medium-gray);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .activity-time {
            font-size: 11px;
            color: var(--medium-gray);
            white-space: nowrap;
            flex-shrink: 0
        }

        /* Filters Bar */
        .filters-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .filter-input,
        .filter-select {
            padding: 9px 14px;
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: var(--font-body);
            color: var(--text);
            background: var(--white);
            transition: border-color var(--transition)
        }

        .filter-input::placeholder {
            color: var(--medium-gray)
        }

        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px var(--maroon-light)
        }

        .filter-input {
            min-width: 200px
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-body);
            transition: all var(--transition);
            white-space: nowrap
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-primary {
            background: var(--maroon);
            color: var(--white)
        }

        .btn-primary:hover {
            background: var(--maroon-dark);
            box-shadow: 0 4px 16px rgba(110, 31, 43, .3);
            transform: translateY(-1px)
        }

        .btn-secondary {
            background: var(--white);
            color: var(--maroon);
            border: 1.5px solid var(--maroon)
        }

        .btn-secondary:hover {
            background: var(--maroon);
            color: var(--white)
        }

        .btn-danger {
            background: var(--red);
            color: var(--white)
        }

        .btn-danger:hover {
            background: #b71c1c
        }

        .btn-ghost {
            background: transparent;
            color: var(--medium-gray);
            border: 1.5px solid var(--light-gray)
        }

        .btn-ghost:hover {
            border-color: var(--maroon);
            color: var(--maroon)
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px
        }

        .btn-icon {
            padding: 8px;
            width: 34px;
            height: 34px;
            justify-content: center
        }

        .btn-block {
            width: 100%;
            justify-content: center
        }

        /* Table */
        .table-wrap {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
            overflow-x: auto
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px
        }

        .data-table thead {
            background: var(--ivory);
            border-bottom: 2px solid var(--light-gray)
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--light-gray);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle
        }

        .data-table tbody tr {
            transition: background .15s
        }

        .data-table tbody tr:hover {
            background: var(--ivory)
        }

        .data-table tbody tr:last-child td {
            border-bottom: none
        }

        .table-actions {
            display: flex;
            gap: 6px
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .03em
        }

        .badge-green {
            background: var(--green-light);
            color: var(--green)
        }

        .badge-blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .badge-orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .badge-red {
            background: var(--red-light);
            color: var(--red)
        }

        .badge-gold {
            background: var(--gold-light);
            color: var(--rust)
        }

        .badge-gray {
            background: rgba(0, 0, 0, .06);
            color: var(--medium-gray)
        }

        /* Vehicle Cards Grid (admin) */
        .admin-vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px
        }

        .admin-v-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition)
        }

        .admin-v-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg)
        }

        .admin-v-img {
            height: 180px;
            background: linear-gradient(135deg, var(--maroon), var(--rust));
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .admin-v-img img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .admin-v-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 6, 5, .5), transparent 60%)
        }

        .admin-v-badge {
            position: absolute;
            top: 12px;
            left: 12px
        }

        .admin-v-type {
            position: absolute;
            bottom: 12px;
            left: 12px;
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            opacity: .9
        }

        .admin-v-body {
            padding: 16px
        }

        .admin-v-name {
            font-family: var(--font-heading);
            font-size: 17px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px
        }

        .admin-v-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 14px
        }

        .admin-v-detail {
            font-size: 12px;
            color: var(--medium-gray);
            display: flex;
            align-items: center;
            gap: 5px
        }

        .admin-v-detail strong {
            color: var(--text);
            font-weight: 600
        }

        .admin-v-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--maroon);
            margin-bottom: 14px
        }

        .admin-v-price span {
            font-size: 12px;
            font-weight: 500;
            color: var(--medium-gray)
        }

        .admin-v-actions {
            display: flex;
            gap: 8px
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 4px
        }

        .view-toggle-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--light-gray);
            background: transparent;
            color: var(--medium-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition)
        }

        .view-toggle-btn.active,
        .view-toggle-btn:hover {
            background: var(--maroon);
            border-color: var(--maroon);
            color: var(--white)
        }

        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 6, 5, .55);
            z-index: 2000;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center
        }

        .modal-backdrop.active {
            display: flex;
            animation: fadeIn .2s ease
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius);
            width: 92%;
            max-width: 580px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(13, 6, 5, .3);
            animation: scaleIn .25s ease
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--light-gray)
        }

        .modal-head h3 {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--maroon)
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--medium-gray);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: color var(--transition)
        }

        .modal-close:hover {
            color: var(--red)
        }

        .modal-body {
            padding: 24px
        }

        .modal-foot {
            padding: 16px 24px;
            border-top: 1px solid var(--light-gray);
            display: flex;
            justify-content: flex-end;
            gap: 10px
        }

        /* Form Groups */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px
        }

        .form-row.full {
            grid-template-columns: 1fr
        }

        .form-group {
            margin-bottom: 0
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text)
        }

        .form-group label .req {
            color: var(--red)
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--light-gray);
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-family: var(--font-body);
            color: var(--text);
            background: var(--white);
            transition: border-color var(--transition), box-shadow var(--transition)
        }

        .form-control:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px var(--maroon-light)
        }

        .form-control::placeholder {
            color: var(--medium-gray)
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l4 4 4-4' stroke='%237a6a64' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px
        }

        .form-hint {
            font-size: 11px;
            color: var(--medium-gray);
            margin-top: 4px
        }

        .form-error {
            font-size: 11px;
            color: var(--red);
            margin-top: 4px;
            display: none
        }

        .form-group.error .form-control {
            border-color: var(--red)
        }

        .form-group.error .form-error {
            display: block
        }

        /* Slide Panel */
        .panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 6, 5, .3);
            z-index: 1500
        }

        .panel-overlay.active {
            display: block
        }

        .slide-panel {
            position: fixed;
            right: -460px;
            top: 0;
            width: 460px;
            max-width: 92vw;
            height: 100vh;
            background: var(--white);
            box-shadow: -4px 0 24px rgba(13, 6, 5, .12);
            z-index: 1600;
            transition: right .35s cubic-bezier(.4, 0, .2, 1);
            overflow-y: auto
        }

        .slide-panel.active {
            right: 0
        }

        .slide-panel-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 2
        }

        .slide-panel-head h3 {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: var(--maroon)
        }

        .slide-panel-body {
            padding: 24px
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--light-gray);
            font-size: 13px
        }

        .detail-row:last-child {
            border-bottom: none
        }

        .detail-label {
            color: var(--medium-gray);
            font-weight: 500
        }

        .detail-value {
            color: var(--text);
            font-weight: 600;
            text-align: right;
            max-width: 60%
        }

        .detail-section-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--maroon);
            margin: 20px 0 8px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--maroon-light)
        }

        /* Toast */
        #toastBox {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none
        }

        .toast {
            background: var(--dark);
            color: var(--white);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight .35s ease;
            min-width: 280px;
            pointer-events: auto;
            font-size: 13px;
            font-weight: 500
        }

        .toast.success {
            border-left: 4px solid var(--green)
        }

        .toast.error {
            border-left: 4px solid var(--red)
        }

        .toast.warning {
            border-left: 4px solid var(--orange)
        }

        .toast.info {
            border-left: 4px solid var(--blue)
        }

        .toast-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, .6);
            cursor: pointer;
            font-size: 18px;
            padding: 0 0 0 8px
        }

        /* Delete Confirm */
        .confirm-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--red-light);
            color: var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px
        }

        .confirm-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.7
        }

        .confirm-text strong {
            color: var(--text)
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--light-gray)
        }

        .tab-btn {
            padding: 11px 18px;
            background: none;
            border: none;
            color: var(--medium-gray);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition)
        }

        .tab-btn:hover {
            color: var(--maroon)
        }

        .tab-btn.active {
            color: var(--maroon);
            border-bottom-color: var(--maroon)
        }

        .tab-pane {
            display: none
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn .3s ease
        }

        /* Booking detail timeline */
        .timeline {
            position: relative;
            padding-left: 24px;
            margin: 16px 0
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: var(--light-gray)
        }

        .timeline-item {
            position: relative;
            padding-bottom: 16px
        }

        .timeline-item:last-child {
            padding-bottom: 0
        }

        .timeline-dot {
            position: absolute;
            left: -20px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--light-gray);
            background: var(--white)
        }

        .timeline-item.done .timeline-dot {
            background: var(--green);
            border-color: var(--green)
        }

        .timeline-item.current .timeline-dot {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 0 4px var(--gold-light)
        }

        .timeline-item.pending .timeline-dot {
            background: var(--white);
            border-color: var(--medium-gray)
        }

        .timeline-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text)
        }

        .timeline-desc {
            font-size: 11px;
            color: var(--medium-gray);
            margin-top: 2px
        }

        /* Settings */
        .settings-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 640px
        }

        .settings-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--light-gray)
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--medium-gray)
        }

        .empty-state svg {
            opacity: .4;
            margin-bottom: 16px
        }

        .empty-state h3 {
            font-family: var(--font-heading);
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px
        }

        .empty-state p {
            font-size: 13px;
            max-width: 300px;
            margin: 0 auto 20px
        }

        /* Responsive */
        @media(max-width:1100px) {
            .charts-grid {
                grid-template-columns: 1fr
            }

            .admin-vehicles-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
            }
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .sidebar-close {
                display: block
            }

            .main {
                margin-left: 0 !important
            }

            .hamburger {
                display: flex !important
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr
            }

            .form-row {
                grid-template-columns: 1fr
            }

            .admin-vehicles-grid {
                grid-template-columns: 1fr
            }

            .content {
                padding: 16px
            }

            .header {
                padding: 0 16px
            }

            .slide-panel {
                width: 100vw;
                max-width: 100vw
            }
        }

        @media(max-width:480px) {
            .stats-grid {
                grid-template-columns: 1fr
            }

            .filters-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 4px
            }

            .filter-input {
                min-width: 160px;
                flex: 1
            }
        }

        @media(prefers-reduced-motion:reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important
            }
        }
    </style>
</head>

        /* ═══════════════════════════════════════════════════════
           VOYAGO ADMIN DASHBOARD — Full Backend-Connected JS
           ═══════════════════════════════════════════════════════ */

        // ─── STATE ───
        const S = {
            section: 'dashboard',
            bookingPage: 1,
            vehiclePage: 1,
            packagePage: 1,
            vehicleView: 'grid',
            charts: {},
            stats: null
        };

        // ─── UTILITIES ───
        function $(sel) { return document.querySelector(sel); }
        function $$(sel) { return document.querySelectorAll(sel); }

        function toast(msg, type = 'info') {
            const box = $('#toastBox');
            const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `<span style="font-size:16px;font-weight:700">${icons[type] || 'ℹ'}</span><span style="flex:1">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
            box.appendChild(el);
            setTimeout(() => { if (el.parentElement) el.remove(); }, 4000);
        }

        function fmtDate(d) {
            if (!d) return '—';
            const dt = new Date(d);
            return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        function fmtDateTime(d) {
            if (!d) return '—';
            const dt = new Date(d);
            return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        }
        function fmtCurrency(n) {
            if (!n && n !== 0) return '—';
            return '₹' + Number(n).toLocaleString('en-IN');
        }
        function fmtRelative(d) {
            if (!d) return '';
            const s = Math.floor((Date.now() - new Date(d)) / 1000);
            if (s < 60) return 'Just now';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            if (s < 86400) return Math.floor(s / 3600) + 'h ago';
            if (s < 604800) return Math.floor(s / 86400) + 'd ago';
            return fmtDate(d);
        }

        function statusBadge(status) {
            const map = {
                'pending': 'badge-orange', 'confirmed': 'badge-blue', 'in-progress': 'badge-gold',
                'completed': 'badge-green', 'cancelled': 'badge-red',
                'paid': 'badge-green', 'partial': 'badge-gold',
                'active': 'badge-green', 'inactive': 'badge-gray',
                'read': 'badge-gray', 'unread': 'badge-blue',
                'true': 'badge-green', 'false': 'badge-red'
            };
            return `<span class="badge ${map[status] || 'badge-gray'}">${status}</span>`;
        }

        function escHtml(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ─── MODAL ───
        function openModal(title, bodyHtml, footHtml) {
            $('#modalTitle').textContent = title;
            $('#modalBody').innerHTML = bodyHtml;
            $('#modalFoot').innerHTML = footHtml || '';
            $('#modalBackdrop').classList.add('active');
        }
        function closeModal() { $('#modalBackdrop').classList.remove('active'); }

        // ─── SLIDE PANEL ───
        function openPanel(title, bodyHtml) {
            $('#panelTitle').textContent = title;
            $('#panelBody').innerHTML = bodyHtml;
            $('#panelOverlay').classList.add('active');
            $('#slidePanel').classList.add('active');
        }
        function closePanel() {
            $('#panelOverlay').classList.remove('active');
            $('#slidePanel').classList.remove('active');
        }

        // ─── CONFIRM DELETE ───
        function confirmDelete(name, onConfirm) {

            const titles = { dashboard: 'Dashboard', bookings: 'Bookings', vehicles: 'Vehicles', packages: 'Packages', users: 'Users', payments: 'Payments', settings: 'Settings' };

        async function checkAuth() {
            const token = API.getToken();
            if (!token) {
                window.location.href = '/admin';
                return false;
            }
            /* Validate token is still good before rendering anything */
            const res = await API.admin.getMe();
            if (!res.success) {
                API.clearToken();
                window.location.href = '/admin';
                return false;
            }
            /* Update sidebar with real admin info */
            const admin = res.data;
            const initials = (admin.name || 'A').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            const avatarEl = document.querySelector('.sidebar-avatar');
            const nameEl = document.querySelector('.sidebar-user-name');
            const roleEl = document.querySelector('.sidebar-user-role');
            if (avatarEl) avatarEl.textContent = initials;
            if (nameEl) nameEl.textContent = admin.name || 'Admin';
            if (roleEl) roleEl.textContent = admin.role || 'Admin';
            return true;
        }

            API.clearToken();

        function renderCharts(monthlyBookings, statusBreakdown, stats) {

            /* FIXED: _id is { year: Number, month: Number }, not a string */

        async function loadBookings() {

            const status = $('#bStatus')?.value;
            const type = $('#bType')?.value;
            const payment = $('#bPayment')?.value;
            if (search) params.set('search', search);
            if (status) params.set('status', status);
            if (type) params.set('bookingType', type);
            if (payment) params.set('paymentStatus', payment);

            const res = await API.admin.getBookings(params.toString());
            if (!res.success) { toast(res.message, 'error'); return; }

            const { data, pagination } = res;
            const tbody = $('#bookingsBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state" style="padding:40px"><h3>No bookings found</h3><p>Try adjusting your filters</p></div></td></tr>`;

        async function saveVehicle(id) {
            const data = {
                name: $('#vfName').value.trim(),
                type: $('#vfType').value,
                brand: $('#vfBrand').value.trim(),
                model: $('#vfModel').value.trim(),
                year: parseInt($('#vfYear').value) || null,
                seats: parseInt($('#vfSeats').value),
                bags: parseInt($('#vfBags').value) || 0,
                fuelType: $('#vfFuel').value || undefined,
                transmission: $('#vfTrans').value || undefined,
                pricePerDay: parseFloat($('#vfPrice').value),
                pricePerKm: parseFloat($('#vfPriceKm').value) || undefined,
                image: $('#vfImage').value.trim() || undefined,
                features: $('#vfFeatures').value.split(',').map(f => f.trim()).filter(Boolean),
                description: $('#vfDesc').value.trim() || undefined,
                badge: $('#vfBadge').value.trim() || '',
                available: $('#vfAvail').value === 'true'
            };
            if (!data.name || !data.type || !data.brand || !data.seats || !data.pricePerDay) {
                toast('Name, Type, Brand, Seats and Price are required.', 'error');
                return;
            }
            const res = id ? await API.admin.updateVehicle(id, data) : await API.admin.createVehicle(data);
            if (res.success) {
                toast(res.message, 'success');
                closeModal();
                loadVehicles();
            } else {
                toast(res.message, 'error');
            }
        }

        function deleteVehicle(id, name) {
            confirmDelete(name, async () => {
                const res = await API.admin.deleteVehicle(id);
                if (res.success) { toast(res.message, 'success'); loadVehicles(); }
                else { toast(res.message, 'error'); }
            });
        }

            else { toast(res.message, 'error'); }
        }

            $('#sec-users').innerHTML = `
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <h3>User Management</h3>
          <p>This section is coming soon. Customer data is currently managed through bookings and contacts.</p>
        </div>
      `;
        }

        // ═══════════════════════════════════════════════════════
        //  PAYMENTS (Derived from Bookings)
        // ═══════════════════════════════════════════════════════
        async function renderPayments() {
            const sec = $('#sec-payments');
            sec.innerHTML = `<div style="text-align:center;padding:60px;color:var(--medium-gray)">Loading payments...</div>`;

            const res = await API.admin.getBookings('limit=50');
            if (!res.success) {
                sec.innerHTML = `<div class="empty-state"><h3>Failed to load</h3><p>${res.message}</p></div>`;
                return;
            }

            const bookings = res.data;
            const totalRevenue = bookings.reduce((s, b) => s + (b.totalPrice || 0), 0);
            const totalPaid = bookings.reduce((s, b) => s + (b.advancePaid || 0), 0);
            const pending = bookings.filter(b => b.paymentStatus === 'pending').length;
            const paid = bookings.filter(b => b.paymentStatus === 'paid').length;

            sec.innerHTML = `
        <div class="stats-grid" style="margin-bottom:24px">
          <div class="stat-card">
            <div class="stat-top"><div class="stat-icon green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div></div>
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">${fmtCurrency(totalRevenue)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-top"><div class="stat-icon blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div></div>
            <div class="stat-label">Amount Collected</div>
            <div class="stat-value">${fmtCurrency(totalPaid)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-top"><div class="stat-icon orange"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div>
            <div class="stat-label">Pending Payments</div>
            <div class="stat-value">${pending}</div>
          </div>
          <div class="stat-card">
            <div class="stat-top"><div class="stat-icon maroon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div></div>
            <div class="stat-label">Fully Paid</div>
            <div class="stat-value">${paid}</div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Type</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead>
            <tbody>
              ${bookings.length === 0 ? '<tr><td colspan="7"><div class="empty-state" style="padding:40px"><p>No payment records</p></div></td></tr>' :
                    bookings.map(b => `<tr>
                  <td><strong style="color:var(--maroon);font-size:12px">${escHtml((b.bookingId || b._id).slice(-8).toUpperCase())}</strong></td>
                  <td>${escHtml(b.name)}</td>
                  <td><span class="badge ${b.bookingType === 'vehicle' ? 'badge-blue' : 'badge-gold'}">${b.bookingType}</span></td>
                  <td><strong>${fmtCurrency(b.totalPrice)}</strong></td>
                  <td style="color:var(--green)">${fmtCurrency(b.advancePaid || 0)}</td>
                  <td style="color:var(--red)">${fmtCurrency((b.totalPrice || 0) - (b.advancePaid || 0))}</td>
                  <td>${statusBadge(b.paymentStatus || 'pending')}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
        }

        // ═══════════════════════════════════════════════════════
        //  SETTINGS
        // ═══════════════════════════════════════════════════════
        function renderSettings() {
            $('#sec-settings').innerHTML = `
        <div class="settings-card">
          <h3>Change Password</h3>
          <div class="form-group" style="margin-bottom:16px">
            <label>Current Password <span class="req">*</span></label>
            <input class="form-control" type="password" id="setCurrPass" placeholder="Enter current password">
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>New Password <span class="req">*</span></label>
            <input class="form-control" type="password" id="setNewPass" placeholder="Enter new password">
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label>Confirm New Password <span class="req">*</span></label>
            <input class="form-control" type="password" id="setConfPass" placeholder="Confirm new password">
          </div>
          <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
        </div>
        <div class="settings-card" style="margin-top:20px">
          <h3>Session Info</h3>
          <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${API.getToken() ? statusBadge('active') : statusBadge('inactive')}</span></div>
          <div class="detail-row"><span class="detail-label">Storage</span><span class="detail-value">${localStorage.getItem('voyago_token') ? 'Local (Remember me)' : 'Session'}</span></div>
        </div>
      `;
        }

        async function changePassword() {
            const current = $('#setCurrPass').value;
            const newPass = $('#setNewPass').value;
            const confirm = $('#setConfPass').value;
            if (!current || !newPass || !confirm) { toast('All fields are required.', 'error'); return; }
            if (newPass !== confirm) { toast('New passwords do not match.', 'error'); return; }
            if (newPass.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }

            const res = await API.admin.changePassword({ currentPassword: current, newPassword: newPass });
            if (res.success) {
                toast(res.message, 'success');
                $('#setCurrPass').value = '';
                $('#setNewPass').value = '';
                $('#setConfPass').value = '';
            } else {
                toast(res.message, 'error');
            }
        }

        // ═══════════════════════════════════════════════════════
        //  PAGINATION HELPER
        // ═══════════════════════════════════════════════════════
        function renderPagination(sel, pag, onPageChange) {
            const el = $(sel);
            if (!el || !pag || pag.pages <= 1) { if (el) el.innerHTML = ''; return; }
            let btns = '';
            for (let i = 1; i <= pag.pages; i++) {
                btns += `<button class="btn btn-sm ${i === pag.page ? 'btn-primary' : 'btn-ghost'}" onclick="void(0)" data-page="${i}">${i}</button>`;
            }
            el.innerHTML = `
        <span style="font-size:13px;color:var(--medium-gray)">Showing ${(pag.page - 1) * pag.limit + 1}–${Math.min(pag.page * pag.limit, pag.total)} of ${pag.total}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" ${pag.page <= 1 ? 'disabled' : ''} data-page="${pag.page - 1}">← Prev</button>
          ${btns}
          <button class="btn btn-ghost btn-sm" ${pag.page >= pag.pages ? 'disabled' : ''} data-page="${pag.page + 1}">Next →</button>
        </div>
      `;
            el.querySelectorAll('[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const p = parseInt(btn.dataset.page);
                    if (p >= 1 && p <= pag.pages) onPageChange(p);
                });
            });
        }

        // ═══════════════════════════════════════════════════════
        //  EVENT LISTENERS & INIT
        // ═══════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', async () => {
            /* FIXED: validate token with server before rendering */
            const authed = await checkAuth();
            if (!authed) return;

            // Navigation
            $$('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => navigate(btn.dataset.section));
            });

            // Sidebar mobile
            $('#hamburgerBtn').addEventListener('click', () => {
                $('#sidebar').classList.add('open');
                $('#sidebarOverlay').classList.add('active');
            });
            $('#sidebarClose').addEventListener('click', () => {
                $('#sidebar').classList.remove('open');
                $('#sidebarOverlay').classList.remove('active');
            });
            $('#sidebarOverlay').addEventListener('click', () => {
                $('#sidebar').classList.remove('open');
                $('#sidebarOverlay').classList.remove('active');
            });

            // Modal close
            $('#modalClose').addEventListener('click', closeModal);
            $('#modalBackdrop').addEventListener('click', (e) => { if (e.target === $('#modalBackdrop')) closeModal(); });

            // Panel close
            $('#panelClose').addEventListener('click', closePanel);
            $('#panelOverlay').addEventListener('click', closePanel);

            // Dropdown
            $('#moreBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                $('#moreDropdown').classList.toggle('active');
            });
            document.addEventListener('click', () => $('#moreDropdown').classList.remove('active'));

            // Notification button -> go to bookings
            $('#notifBtn').addEventListener('click', () => navigate('bookings'));

            // Header time
            updateHeaderTime();
            setInterval(updateHeaderTime, 30000);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { closeModal(); closePanel(); }
            });

            // Load dashboard
            navigate('dashboard');
        });
    </script>
</body>

</html>
