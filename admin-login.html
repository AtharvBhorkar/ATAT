<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voyago — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --maroon-dark: #3d0f12;
            --maroon: #5c1a1f;
            --gold: #cf9a3a;
            --gold-light: #d4a017;
            --ivory: #f7f3ec;
            --charcoal: #2b2b2b;
            --rust: #b5511f;
            --gray: #8a8a8a;
            --gray-light: #d9d4cb;
            --error: #c0392b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--charcoal);
            background: #0d0605;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(16px, 4vw, 40px);
            position: relative;
            overflow-x: hidden;
            isolation: isolate;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-layer--radial {
            background: radial-gradient(ellipse 120% 90% at 25% 15%, rgba(181, 81, 31, 0.35) 0%, rgba(61, 15, 18, 0.18) 35%, rgba(13, 6, 5, 0.9) 70%, #0a0404 100%);
            animation: radialShift 14s ease-in-out infinite alternate;
        }

        @keyframes radialShift {
            0% {
                background: radial-gradient(ellipse 120% 90% at 25% 15%, rgba(181, 81, 31, 0.35) 0%, rgba(61, 15, 18, 0.18) 35%, rgba(13, 6, 5, 0.9) 70%, #0a0404 100%);
            }

            33% {
                background: radial-gradient(ellipse 130% 100% at 60% 25%, rgba(207, 154, 58, 0.28) 0%, rgba(92, 26, 31, 0.2) 30%, rgba(13, 6, 5, 0.88) 65%, #0a0303 100%);
            }

            66% {
                background: radial-gradient(ellipse 110% 95% at 70% 10%, rgba(181, 81, 31, 0.3) 0%, rgba(61, 15, 18, 0.15) 40%, rgba(13, 6, 5, 0.92) 72%, #0b0505 100%);
            }

            100% {
                background: radial-gradient(ellipse 125% 85% at 15% 30%, rgba(212, 160, 23, 0.25) 0%, rgba(61, 15, 18, 0.22) 32%, rgba(13, 6, 5, 0.9) 68%, #0a0404 100%);
            }
        }

        .bg-layer--sweep {
            background: linear-gradient(145deg, rgba(92, 26, 31, 0.5) 0%, rgba(13, 6, 5, 0.2) 30%, rgba(181, 81, 31, 0.25) 55%, rgba(13, 6, 5, 0.6) 80%, #0d0605 100%);
            background-size: 250% 250%;
            animation: sweepGradient 18s ease-in-out infinite;
            mix-blend-mode: overlay;
            opacity: 0.85;
        }

        @keyframes sweepGradient {
            0% {
                background-position: 0% 0%;
            }

            25% {
                background-position: 50% 30%;
            }

            50% {
                background-position: 100% 70%;
            }

            75% {
                background-position: 40% 90%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        .bg-layer--texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            opacity: 0.7;
            animation: textureDrift 22s linear infinite;
        }

        @keyframes textureDrift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 200px 200px;
            }
        }

        .bg-layer--particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 160, 23, 0.7) 0%, rgba(207, 154, 58, 0.25) 40%, transparent 70%);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            left: 12%;
            animation-duration: 9s;
            animation-delay: 0s;
            box-shadow: 0 0 8px 3px rgba(212, 160, 23, 0.5);
        }

        .particle:nth-child(2) {
            width: 2.5px;
            height: 2.5px;
            left: 28%;
            animation-duration: 11s;
            animation-delay: 2s;
            box-shadow: 0 0 6px 2px rgba(207, 154, 58, 0.45);
        }

        .particle:nth-child(3) {
            width: 3.5px;
            height: 3.5px;
            left: 44%;
            animation-duration: 8s;
            animation-delay: 4s;
            box-shadow: 0 0 7px 3px rgba(181, 81, 31, 0.5);
        }

        .particle:nth-child(4) {
            width: 2px;
            height: 2px;
            left: 58%;
            animation-duration: 13s;
            animation-delay: 1s;
            box-shadow: 0 0 5px 2px rgba(212, 160, 23, 0.4);
        }

        .particle:nth-child(5) {
            width: 5px;
            height: 5px;
            left: 72%;
            animation-duration: 10s;
            animation-delay: 5s;
            box-shadow: 0 0 10px 4px rgba(207, 154, 58, 0.55);
        }

        .particle:nth-child(6) {
            width: 3px;
            height: 3px;
            left: 85%;
            animation-duration: 12s;
            animation-delay: 3s;
            box-shadow: 0 0 7px 2px rgba(181, 81, 31, 0.5);
        }

        .particle:nth-child(7) {
            width: 2px;
            height: 2px;
            left: 6%;
            animation-duration: 9.5s;
            animation-delay: 6s;
            box-shadow: 0 0 5px 2px rgba(212, 160, 23, 0.4);
        }

        .particle:nth-child(8) {
            width: 4.5px;
            height: 4.5px;
            left: 35%;
            animation-duration: 11.5s;
            animation-delay: 7s;
            box-shadow: 0 0 9px 3px rgba(207, 154, 58, 0.5);
        }

        .particle:nth-child(9) {
            width: 2.8px;
            height: 2.8px;
            left: 52%;
            animation-duration: 8.5s;
            animation-delay: 2.5s;
            box-shadow: 0 0 6px 2px rgba(181, 81, 31, 0.45);
        }

        .particle:nth-child(10) {
            width: 3.2px;
            height: 3.2px;
            left: 66%;
            animation-duration: 10.5s;
            animation-delay: 4.5s;
            box-shadow: 0 0 7px 3px rgba(212, 160, 23, 0.5);
        }

        .particle:nth-child(11) {
            width: 1.8px;
            height: 1.8px;
            left: 78%;
            animation-duration: 14s;
            animation-delay: 1.5s;
            box-shadow: 0 0 4px 2px rgba(207, 154, 58, 0.35);
        }

        .particle:nth-child(12) {
            width: 3.8px;
            height: 3.8px;
            left: 20%;
            animation-duration: 9.8s;
            animation-delay: 5.5s;
            box-shadow: 0 0 8px 3px rgba(181, 81, 31, 0.5);
        }

        @keyframes floatUp {
            0% {
                bottom: -40px;
                opacity: 0;
                transform: translateX(0) scale(0.3);
            }

            15% {
                opacity: 0.9;
                transform: translateX(8px) scale(1);
            }

            35% {
                transform: translateX(-6px) scale(1.2);
            }

            55% {
                transform: translateX(4px) scale(0.9);
            }

            75% {
                opacity: 0.5;
                transform: translateX(-10px) scale(0.6);
            }

            100% {
                bottom: 105%;
                opacity: 0;
                transform: translateX(12px) scale(0.2);
            }
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            border: 1.5px solid var(--rust);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: ringPulse 8s ease-in-out infinite alternate, ringRotate 30s linear infinite;
            box-shadow: 0 0 0 60px rgba(181, 81, 31, 0.06), 0 0 0 120px rgba(181, 81, 31, 0.04), 0 0 0 200px rgba(181, 81, 31, 0.02);
        }

        body::before {
            top: -550px;
            left: -450px;
            animation-delay: 0s;
        }

        body::after {
            bottom: -550px;
            right: -450px;
            animation-delay: -4s;
            border-color: rgba(207, 154, 58, 0.6);
            box-shadow: 0 0 0 60px rgba(207, 154, 58, 0.05), 0 0 0 120px rgba(207, 154, 58, 0.03), 0 0 0 200px rgba(207, 154, 58, 0.015);
        }

        @keyframes ringPulse {
            0% {
                opacity: 0.08;
                transform: scale(1);
            }

            50% {
                opacity: 0.16;
                transform: scale(1.04);
            }

            100% {
                opacity: 0.09;
                transform: scale(1.01);
            }
        }

        @keyframes ringRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .card {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .header-panel {
            background: linear-gradient(160deg, var(--maroon) 0%, var(--maroon-dark) 100%);
            border-radius: 20px 20px 20px 20px;
            padding: clamp(28px, 5vw, 40px) clamp(24px, 4vw, 32px) clamp(48px, 7vw, 64px);
            text-align: center;
            color: #fff;
            position: relative;
        }

        .badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a0709;
            display: grid;
            place-items: center;
            margin: 0 auto 18px;
            border: 1.5px solid rgba(212, 160, 23, 0.3);
        }

        .badge svg {
            width: 30px;
            height: 30px;
            stroke: var(--gold-light);
            fill: none;
            stroke-width: 1.8;
        }

        h1.welcome {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(26px, 5vw, 34px);
            line-height: 1.15;
            margin-bottom: 8px;
        }

        h1.welcome .gold {
            color: var(--gold-light);
            font-style: italic;
        }

        .subhead {
            color: #e8dccd;
            font-size: clamp(13px, 2.5vw, 15px);
            font-weight: 400;
            opacity: 0.85;
        }

        .form-panel {
            background: var(--ivory);
            border-radius: 20px;
            margin-top: -32px;
            padding: clamp(22px, 4vw, 32px) clamp(20px, 4vw, 30px);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.55), 0 8px 20px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(92, 26, 31, 0.08);
            color: var(--maroon);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 16px 6px 12px;
            border-radius: 100px;
            margin-bottom: 20px;
            border: 1px solid rgba(92, 26, 31, 0.12);
        }

        .admin-badge svg {
            width: 14px;
            height: 14px;
            stroke: var(--maroon);
            fill: none;
            stroke-width: 2;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        label.lbl {
            font-size: clamp(10.5px, 2vw, 11.5px);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #5a5651;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap svg.left,
        .input-wrap button.right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--gray);
            fill: none;
            stroke-width: 1.8;
        }

        .input-wrap svg.left {
            left: 14px;
        }

        .input-wrap button.right {
            right: 12px;
            background: none;
            border: 0;
            padding: 4px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
        }

        .input-wrap button.right svg {
            width: 18px;
            height: 18px;
            stroke: var(--gray);
            fill: none;
            stroke-width: 1.8;
        }

        .input-wrap input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            padding: 14px 14px 14px 42px;
            border: 1px solid #e2dccf;
            border-radius: 10px;
            background: #fff;
            color: var(--charcoal);
            transition: border-color .15s ease, box-shadow .15s ease;
            min-height: 46px;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(92, 26, 31, 0.12);
        }

        .input-wrap input[type="password"],
        .input-wrap.has-toggle input {
            padding-right: 44px;
        }

        .error-msg {
            color: var(--error);
            font-size: 12px;
            min-height: 0;
            display: none;
        }

        .field.has-error .input-wrap input {
            border-color: var(--error);
        }

        .field.has-error .error-msg {
            display: block;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #4d4944;
            user-select: none;
            min-height: 44px;
        }

        .remember input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .check {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid #b9b1a2;
            display: grid;
            place-items: center;
            background: #fff;
            transition: all .15s ease;
        }

        .check svg {
            width: 12px;
            height: 12px;
            stroke: #fff;
            fill: none;
            stroke-width: 3;
            opacity: 0;
        }

        .remember input:checked+.check {
            background: var(--maroon);
            border-color: var(--maroon);
        }

        .remember input:checked+.check svg {
            opacity: 1;
        }

        .remember input:focus-visible+.check {
            box-shadow: 0 0 0 3px rgba(207, 154, 58, 0.4);
        }

        .btn-login {
            width: 100%;
            margin-top: 4px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #fff;
            background: linear-gradient(180deg, #d6a445 0%, var(--gold) 100%);
            border: 0;
            border-radius: 12px;
            padding: 16px;
            min-height: 52px;
            cursor: pointer;
            box-shadow: 0 6px 14px -4px rgba(207, 154, 58, 0.55);
            transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            filter: brightness(0.95);
            box-shadow: 0 10px 18px -4px rgba(207, 154, 58, 0.6);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login[disabled] {
            cursor: wait;
            opacity: 0.85;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 22px;
            font-size: 12px;
            color: var(--gray);
        }

        .footer-note a {
            color: var(--maroon);
            font-weight: 600;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        .form-fade {
            animation: fadeIn .25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-height: 720px) {
            .header-panel {
                padding-top: 22px;
                padding-bottom: 40px;
            }

            .badge {
                margin-bottom: 12px;
                width: 52px;
                height: 52px;
            }

            .badge svg {
                width: 26px;
                height: 26px;
            }

            .form-panel {
                margin-top: -28px;
            }

            form {
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .card {
                max-width: 95vw;
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer bg-layer--radial" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--sweep" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--texture" aria-hidden="true"></div>
    <div class="bg-layer--particles" aria-hidden="true">
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
        <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    </div>

    <main class="card" role="main">
        <section class="header-panel" aria-labelledby="welcome-heading">
            <div class="badge" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <rect x="4" y="8" width="16" height="11" rx="2" />
                    <path d="M9 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" />
                    <path d="M14 14l5-2-1 3 1 3-5-2-3 1 1-2-1-2z" stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="welcome" id="welcome-heading">Admin <span class="gold">Portal</span></h1>
            <p class="subhead">Secure access to the Voyago control panel.</p>
        </section>

        <section class="form-panel">
            <div style="display:flex;justify-content:center;">
                <span class="admin-badge" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="7" width="18" height="13" rx="2" />
                        <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <path d="M12 12v4" />
                        <circle cx="12" cy="18" r="0.5" fill="currentColor" stroke="none" />
                    </svg>
                    Administrator
                </span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-fade">
                    <div class="field" id="email-field">
                        <label class="lbl" for="email">Admin Email</label>
                        <div class="input-wrap">
                            <svg class="left" viewBox="0 0 24 24">
                                <rect x="3" y="5" width="18" height="14" rx="2" />
                                <path d="M3 7l9 7 9-7" />
                            </svg>
                            <input type="email" id="email" name="email" autocomplete="email"
                                placeholder="admin@voyago.com" required />
                        </div>
                        <p class="error-msg" id="email-error">Please enter a valid admin email address.</p>
                    </div>

                    <div class="field" style="margin-top:14px;">
                        <div class="label-row">
                            <label class="lbl" for="password">Password</label>
                        </div>
                        <div class="input-wrap has-toggle">
                            <svg class="left" viewBox="0 0 24 24">
                                <rect x="4" y="11" width="16" height="10" rx="2" />
                                <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                            </svg>
                            <input type="password" id="password" name="password" autocomplete="current-password"
                                placeholder="••••••••" required minlength="8" />
                            <button type="button" class="right" id="togglePwd" aria-label="Show password"
                                aria-pressed="false">
                                <svg id="eyeIcon" viewBox="0 0 24 24">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <p class="error-msg" id="password-error">Password must be at least 8 characters.</p>
                    </div>

                    <label class="remember" style="margin-top:14px;">
                        <input type="checkbox" id="remember" />
                        <span class="check" aria-hidden="true"><svg viewBox="0 0 24 24">
                                <polyline points="4 12 10 18 20 6" />
                            </svg></span>
                        Remember me on this device
                    </label>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="spinner" aria-hidden="true"></span>
                        <span class="btn-label">Log In</span>
                    </button>
                </div>
            </form>

            <p class="footer-note">Secure &bull; Admin access only</p>
        </section>
    </main>

    <script>
        (function () {
            const $ = (s) => document.querySelector(s);
            const form = $('#loginForm');
            const email = $('#email');
            const emailError = $('#email-error');
            const password = $('#password');
            const passwordError = $('#password-error');
            const rememberCb = $('#remember');
            const loginBtn = $('#loginBtn');

            try {
                if (localStorage.getItem('voyago_admin_remember') === '1') {
                    rememberCb.checked = true;
                    const saved = localStorage.getItem('voyago_admin_email');
                    if (saved) email.value = saved;
                }
            } catch (e) { }

            $('#togglePwd').addEventListener('click', () => {
                const isPwd = password.type === 'password';
                password.type = isPwd ? 'text' : 'password';
                const btn = $('#togglePwd');
                btn.setAttribute('aria-pressed', String(isPwd));
                btn.setAttribute('aria-label', isPwd ? 'Hide password' : 'Show password');
                $('#eyeIcon').innerHTML = isPwd ?
                    '<path d="M3 3l18 18"/><path d="M10.6 6.1A10.6 10.6 0 0 1 12 6c6.5 0 10 6 10 6a17 17 0 0 1-3.2 4M6.2 7.7A17 17 0 0 0 2 12s3.5 6 10 6c1.6 0 3-.3 4.2-.8"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>' :
                    '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>';
            });

            function setError(name, msg) {
                const field = document.getElementById(name).closest('.field');
                field.classList.add('has-error');
                if (msg) document.getElementById(name + '-error').textContent = msg;
            }

            function clearError(name) {
                document.getElementById(name).closest('.field').classList.remove('has-error');
            }

            email.addEventListener('input', () => clearError('email'));
            password.addEventListener('input', () => clearError('password'));

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let ok = true;
                const emailVal = email.value.trim();
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!re.test(emailVal)) {
                    setError('email', 'Please enter a valid admin email address.');
                    ok = false;
                }
                if (password.value.length < 8) {
                    setError('password', 'Password must be at least 8 characters.');
                    ok = false;
                }
                if (!ok) return;

                try {
                    if (rememberCb.checked) {
                        localStorage.setItem('voyago_admin_remember', '1');
                        localStorage.setItem('voyago_admin_email', emailVal);
                    } else {
                        localStorage.removeItem('voyago_admin_remember');
                        localStorage.removeItem('voyago_admin_email');
                    }
                } catch (e) { }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                loginBtn.querySelector('.btn-label').textContent = 'Signing in…';
                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    loginBtn.querySelector('.btn-label').textContent = 'Log In';
                    // For demo: show success
                    alert('Admin login successful! (Demo)');
                }, 1500);
            });
        })();
    </script>
</body>

</html>
